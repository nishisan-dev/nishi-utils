name: OWASP Dependency Scan (devsec)

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  security-scan:
    name: Dependency Vulnerability Scan
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'devsec')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-db-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            nvd-db-${{ runner.os }}-

      - name: OWASP Dependency Check
        run: mvn -B verify -Psecurity-scan -DskipTests -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.*
          retention-days: 30
