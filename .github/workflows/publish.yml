name: Maven Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Extract version from tag
      run: |
        if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Tag must match v<major>.<minor>.<patch>, got: ${GITHUB_REF_NAME}"
          exit 1
        fi
        VERSION="${GITHUB_REF_NAME#v}"
        echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Releasing version: $VERSION"

    - name: Set POM version
      run: mvn versions:set -DnewVersion=${{ env.RELEASE_VERSION }} -DgenerateBackupPoms=false

    - name: Publish to GitHub Packages
      run: mvn -B -DskipTests deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: "Release ${{ github.ref_name }}"
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Prune old releases (keep last 5)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        KEEP=5
        RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName')
        COUNT=0
        for TAG in $RELEASES; do
          COUNT=$((COUNT + 1))
          if [ "$COUNT" -gt "$KEEP" ]; then
            echo "Deleting release $TAG (keeping tags)"
            gh release delete "$TAG" --yes --cleanup-tag=false
          fi
        done
