# SLF4J Simple Logger configuration for ngrid-test
org.slf4j.simpleLogger.defaultLogLevel=info

# Suppress verbose Testcontainers container logging (which echoes MAP-PUT/MAP-READ/STDOUT)
# Keeps WARN and ERROR so we still see if a container fails or throws exceptions
org.slf4j.simpleLogger.log.ngrid=warn
org.slf4j.simpleLogger.log.tc=info
org.slf4j.simpleLogger.log.org.testcontainers=info
