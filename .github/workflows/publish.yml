name: Maven Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag in format v<major>.<minor>.<patch>
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Extract version from tag
      run: |
        TAG="${{ github.event.release.tag_name || inputs.release_tag }}"
        if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Tag must match v<major>.<minor>.<patch>, got: $TAG"
          exit 1
        fi
        VERSION="${TAG#v}"
        echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
        echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Releasing version: $VERSION"

    - name: Set POM version
      run: mvn versions:set -DnewVersion=${{ env.RELEASE_VERSION }} -DgenerateBackupPoms=false -DprocessAllModules=true -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}

    - name: Build and publish to GitHub Packages
      run: mvn -B -DskipTests -pl nishi-utils-core -am deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: ${{ github.actor }}

    - name: Upload artifacts to release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release upload "${{ env.RELEASE_TAG }}" \
          nishi-utils-core/target/nishi-utils-core-${{ env.RELEASE_VERSION }}.jar \
          nishi-utils-core/target/nishi-utils-core-${{ env.RELEASE_VERSION }}-sources.jar \
          nishi-utils-core/target/nishi-utils-core-${{ env.RELEASE_VERSION }}-javadoc.jar \
          --clobber

    - name: Prune old releases (keep last 5)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        KEEP=5
        RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName')
        COUNT=0
        for TAG in $RELEASES; do
          COUNT=$((COUNT + 1))
          if [ "$COUNT" -gt "$KEEP" ]; then
            echo "Deleting release $TAG (keeping tags)"
            gh release delete "$TAG" --yes
          fi
        done
