version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      jackson:
        patterns:
          - "com.fasterxml.jackson*"
      spring-boot:
        patterns:
          - "org.springframework.boot*"
      testing:
        patterns:
          - "org.junit*"
          - "org.testcontainers*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
