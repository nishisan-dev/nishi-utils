name: PR Validation & Resilience Pipeline

on:
  push:
    branches:
      - main
      - feature/queue-consumer
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      soak_duration_minutes:
        description: 'Soak test duration in minutes'
        required: false
        default: '720'
      run_soak:
        description: 'Run soak test (true/false)'
        required: false
        default: 'false'

jobs:
  unit-tests:
    name: Standard Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Run unit tests with coverage
        run: mvn -B verify -pl nishi-utils-core -Dsurefire.rerunFailingTestsCount=1

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: nishi-utils-core/target/site/jacoco/
          retention-days: 14

  resilience-tests:
    name: Resilience Tests (In-Process)
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Run NGrid resilience tests
        run: mvn -B test -Presilience -Dsurefire.rerunFailingTestsCount=1

  docker-resilience-gate:
    name: Docker Resilience Gate
    needs: resilience-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build Docker test image
        run: docker build -t ngrid-test:latest -f ngrid-test/Dockerfile .

      - name: Install parent and core modules
        run: mvn -B -DskipTests -Dmaven.javadoc.skip=true -pl nishi-utils-core install -am

      - name: Run resilience integration tests
        run: |
          mvn -pl ngrid-test verify \
            -Dngrid.test.docker=true \
            -Dtest='NGridLeaderFailoverIT,NGridMapLeaderCrashIT,NGridMapReelectionIT,NGridMapConcurrentWriteFailoverIT,NGridPartitionResilienceIT,NGridQueueConcurrentFailoverIT' \
            -DfailIfNoTests=false

  soak-test:
    name: Soak Test (Long-Running)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_soak == 'true'
    needs: docker-resilience-gate
    runs-on: ubuntu-latest
    timeout-minutes: 1500
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Run soak test
        run: |
          mvn -B test -Psoak \
            -Dngrid.soak.durationMinutes=${{ github.event.inputs.soak_duration_minutes }}

      - name: Upload soak report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-report
          path: target/soak-report.md
          retention-days: 30
